  nikita: { hash: "8be81b94c7fa0b441af35831ad359e03b395df561476c4ba78d4db90d7ebba2a", display: "Nikita", role: "artist" },
  igor:   { hash: "b83df2f5f0e323e50fa5cd9b034d81a3481d88c953acf04a6ff5a97f03036e9b", display: "Igor",   role: "artist" },
};

async function sha256(str) {
  const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,"0")).join("");
}

let currentUser = null;

async function tryLogin() {
  const pass = document.getElementById("loginPass").value.trim();
  if (!pass) return;
  const h = await sha256(pass);
  let found = null;
  for (const [id, u] of Object.entries(USERS)) {
    if (u.hash === h) { found = { id, ...u }; break; }
  }
  if (found) {
    currentUser = found;
    sessionStorage.setItem("kh_user", found.id);
    showLoggedIn();
  } else {
    document.getElementById("loginError").textContent = "Wrong password";
  }
}

function guestLogin() {
  currentUser = { id: "guest", display: "Guest", role: "guest" };
  sessionStorage.setItem("kh_user", "guest");
  showLoggedIn();
}

document.getElementById("loginPass").addEventListener("keydown", e => {
  if (e.key === "Enter") tryLogin();
});

function showLoggedIn() {
  document.getElementById("loginOverlay").classList.add("hidden");
  document.getElementById("userBadge").style.display = "inline-flex";
  document.getElementById("userName").textContent = currentUser.display;
  document.getElementById("userDot").className = "dot dot-" + currentUser.id;
  render();
}

function logout() {
  sessionStorage.removeItem("kh_user");
  currentUser = null;
  document.getElementById("loginOverlay").classList.remove("hidden");
  document.getElementById("userBadge").style.display = "none";
  document.getElementById("loginPass").value = "";
  document.getElementById("loginError").textContent = "";
  render();
}

(async function checkSession() {
  const saved = sessionStorage.getItem("kh_user");
  if (saved === "guest") {
    guestLogin();
  } else if (saved && USERS[saved]) {
    currentUser = { id: saved, ...USERS[saved] };
    showLoggedIn();
  }
})();

function isAdmin() { return currentUser && currentUser.role === "admin"; }
function isArtist() { return currentUser && currentUser.role === "artist"; }
function isGuest() { return !currentUser || currentUser.role === "guest"; }

function canEditStatus(taskId) {
  if (isGuest()) return false;
  if (isAdmin()) return true;
  return getAssignee(taskId) === currentUser.id;
}
function canAssign() { return isAdmin(); }
function canEditAdminNote() { return isAdmin(); }
function canEditArtistNote(taskId) {
  if (isGuest()) return false;
  if (isAdmin()) return true;
  return isArtist() && getAssignee(taskId) === currentUser.id;
}

  catch { return {}; }
}
function saveState(st) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(st));
  const n = document.getElementById("saveNotice");
  n.classList.add("show");
  setTimeout(() => n.classList.remove("show"), 1200);
}

let state = loadState();
let currentFilter = "all";
let artistFilter = "all";
let searchQuery = "";
let sortCol = -1;
let sortAsc = true;

function getStatus(id) { return (state[id] && state[id].status) || "todo"; }
function getAdminNote(id) { return (state[id] && state[id].adminNote) || ""; }
function getArtistNote(id) { return (state[id] && state[id].artistNote) || ""; }
function getAssignee(id) { return (state[id] && state[id].assignee) || ""; }

// Migrate old "notes" → "adminNote"
(function migrateNotes() {
  let changed = false;
  for (const [id, d] of Object.entries(state)) {
    if (d.notes && !d.adminNote) {
      d.adminNote = d.notes;
      delete d.notes;
      changed = true;
    }
  }
  if (changed) localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
})();

function updateStats() {
  let c = { todo:0, progress:0, review:0, done:0, skip:0 };
  TASKS.forEach(t => { c[getStatus(t.id)]++; });
  document.getElementById("stat-todo").textContent = c.todo;
  document.getElementById("stat-progress").textContent = c.progress;
  document.getElementById("stat-review").textContent = c.review;
  document.getElementById("stat-done").textContent = c.done;
}

// --- NOTE MODAL ---
let noteModalTaskId = null;
let noteModalDirty = false;

function openNote(taskId) {
  noteModalTaskId = taskId;
  noteModalDirty = false;
  const task = TASKS.find(t => t.id === taskId);
  document.getElementById("noteModalId").textContent = taskId + " — " + (task ? task.desc : "");

  const adminText = getAdminNote(taskId);
  const artistText = getArtistNote(taskId);
  const canAdmin = canEditAdminNote();
  const canArtist = canEditArtistNote(taskId);
  const showSave = canAdmin || canArtist;

  let html = "";

  // Admin notes section
  html += `<div class="note-section">`;
  html += `<div class="note-modal-label admin-label">Admin Notes</div>`;
  if (canAdmin) {
    html += `<textarea id="noteAdminTA" placeholder="Admin notes...">${esc(adminText)}</textarea>`;
  } else {
    html += `<div class="note-readonly">${adminText ? esc(adminText) : '<span class="note-empty">No admin notes</span>'}</div>`;
  }
  html += `</div>`;

  // Artist notes section
  html += `<div class="note-section">`;
  html += `<div class="note-modal-label artist-label">Artist Notes</div>`;
  if (canArtist) {
    html += `<textarea id="noteArtistTA" placeholder="Questions, comments...">${esc(artistText)}</textarea>`;
  } else {
    html += `<div class="note-readonly">${artistText ? esc(artistText) : '<span class="note-empty">No artist notes</span>'}</div>`;
  }
  html += `</div>`;

  document.getElementById("noteModalBody").innerHTML = html;
  document.getElementById("noteModalSave").style.display = showSave ? "block" : "none";
  document.getElementById("noteOverlay").classList.remove("hidden");

  // Focus first editable textarea
  const ta = document.getElementById("noteAdminTA") || document.getElementById("noteArtistTA");
  if (ta) setTimeout(() => ta.focus(), 50);
}

function closeNote() {
  document.getElementById("noteOverlay").classList.add("hidden");
  noteModalTaskId = null;
}

function saveNote() {
  if (!noteModalTaskId) return;
  if (!state[noteModalTaskId]) state[noteModalTaskId] = {};

  const adminTA = document.getElementById("noteAdminTA");
  const artistTA = document.getElementById("noteArtistTA");
  if (adminTA) state[noteModalTaskId].adminNote = adminTA.value;
  if (artistTA) state[noteModalTaskId].artistNote = artistTA.value;

  saveState(state);
  closeNote();
  render();
}

// Close on Escape
document.addEventListener("keydown", e => {
  if (e.key === "Escape" && !document.getElementById("noteOverlay").classList.contains("hidden")) {
    closeNote();
  }
});

function esc(s) {
  return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

function truncate(s, len) {
  if (!s) return "";
  return s.length > len ? s.substring(0, len) + "..." : s;
}

// --- RENDER ---
function render() {
  const tbody = document.getElementById("tbody");
  let rows = TASKS.map((t, i) => ({
    ...t, idx: i + 1,
    status: getStatus(t.id),
    assignee: getAssignee(t.id)
  }));

  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    rows = rows.filter(r => r.id.toLowerCase().includes(q) || r.desc.toLowerCase().includes(q));
  }
  if (currentFilter !== "all") rows = rows.filter(r => r.status === currentFilter);
  if (artistFilter !== "all") {
    if (artistFilter === "unassigned") rows = rows.filter(r => !r.assignee);
    else rows = rows.filter(r => r.assignee === artistFilter);
  }
  if (sortCol >= 0) {
    const keys = ["idx","id","desc","cat","tcIn","tcOut","assignee","status"];
    const k = keys[sortCol];
    rows.sort((a, b) => {
      let va = a[k], vb = b[k];
      if (typeof va === "string") va = va.toLowerCase();
      if (typeof vb === "string") vb = vb.toLowerCase();
      return va < vb ? (sortAsc?-1:1) : va > vb ? (sortAsc?1:-1) : 0;
    });
  }

  tbody.innerHTML = rows.map(r => {
    const st = r.status;
    const stClass = "s-" + st;
    const editSt = canEditStatus(r.id);
    const adm = canAssign();
    const assignCls = r.assignee ? " assign-" + r.assignee : "";

    const adminNote = getAdminNote(r.id);
    const artistNote = getArtistNote(r.id);
    const adminPreview = truncate(adminNote, 20);
    const artistPreview = truncate(artistNote, 20);
    const adminHas = adminNote ? " has-text" : "";
    const artistHas = artistNote ? " has-text" : "";

    const artistOptions = ARTISTS.map(a =>
      `<option value="${a.id}" ${r.assignee===a.id?"selected":""}>${a.display}</option>`
    ).join("");

    return `<tr>
      <td style="color:#484f58">${r.idx}</td>
      <td class="id-cell">${r.id}</td>
      <td class="desc-cell">${r.desc}</td>
      <td class="category-cell"><span class="cat-tag cat-${r.cat}">${CAT_LABELS[r.cat]}</span></td>
      <td class="tc-cell">${r.tcIn}</td>
      <td class="tc-cell">${r.tcOut}</td>
      <td>
        <select class="assign-select${assignCls}" onchange="setAssignee('${r.id}',this.value,this)" ${adm?"":"disabled"}>
          <option value="" ${!r.assignee?"selected":""}>—</option>
          ${artistOptions}
        </select>
      </td>
      <td>
        <select class="status-select ${stClass}" onchange="setStatus('${r.id}',this.value,this)" ${editSt?"":"disabled"}>
          <option value="todo" ${st==="todo"?"selected":""}>TODO</option>
          <option value="progress" ${st==="progress"?"selected":""}>In Progress</option>
          <option value="review" ${st==="review"?"selected":""}>Review</option>
          <option value="done" ${st==="done"?"selected":""}>Done</option>
          <option value="skip" ${st==="skip"?"selected":""}>Skip</option>
        </select>
      </td>
      <td><button class="note-btn admin-note${adminHas}" onclick="openNote('${r.id}')">${adminPreview || "..."}</button></td>
      <td><button class="note-btn artist-note${artistHas}" onclick="openNote('${r.id}')">${artistPreview || "..."}</button></td>
    </tr>`;
  }).join("");

  updateStats();
}

function setStatus(id, val, el) {
  if (!canEditStatus(id)) return;
  if (!state[id]) state[id] = {};
  state[id].status = val;
  saveState(state);
  el.className = "status-select s-" + val;
  updateStats();
}

function setAssignee(id, val, el) {
  if (!canAssign()) return;
  if (!state[id]) state[id] = {};
  state[id].assignee = val;
  saveState(state);
  render();
}

function sortTable(col) {
  if (sortCol === col) sortAsc = !sortAsc;
  else { sortCol = col; sortAsc = true; }
  render();
}

document.getElementById("search").addEventListener("input", e => {
  searchQuery = e.target.value; render();
});
document.querySelectorAll(".filter-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    currentFilter = btn.dataset.filter; render();
  });
});
document.querySelectorAll(".artist-filter-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".artist-filter-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    artistFilter = btn.dataset.artist; render();
  });
});

function exportCSV() {
  let csv = "ID,Description,Category,TC In,TC Out,Artist,Status,Admin Notes,Artist Notes\n";
  TASKS.forEach(t => {
    const st = getStatus(t.id), artist = getAssignee(t.id);
    const an = getAdminNote(t.id).replace(/"/g,'""');
    const ar = getArtistNote(t.id).replace(/"/g,'""');
    csv += `"${t.id}","${t.desc}","${CAT_LABELS[t.cat]}","${t.tcIn}","${t.tcOut}","${artist}","${st}","${an}","${ar}"\n`;
  });
  const blob = new Blob(["\uFEFF"+csv], {type:"text/csv;charset=utf-8;"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "kh_vfx_tracker.csv"; a.click();
}

render();
</script>
</body>
</html>
